<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<script>
			/* ─── NimOS · Escala de UI · pintura pre-paint ──────────────
			 * ÚNICA función: aplicar la escala MANUAL persistida antes del
			 * primer paint, para que la UI no salte de 1.0 al valor del
			 * usuario cuando theme.js hidrata (sin flash).
			 *
			 * MODELO (Beta 9): la escala es el font-size raíz vía
			 * --ui-scale (ver app.css `html { font-size: calc(16px *
			 * var(--ui-scale)) }`). YA NO se usa `zoom`: corrompía el
			 * espacio de coordenadas y rompía la maqueta medida en JS
			 * (ventanas, grid) en pantallas distintas. Con font-size las
			 * coordenadas son honestas en todas las pantallas.
			 *
			 * NO hay heurística por viewport. La escala es MANUAL y
			 * determinista: no depende del tamaño de pantalla, DPR ni zoom
			 * del navegador (los tres mueven el mismo número y no se separan
			 * con APIs web — auto-detectar es inestable, lección de Beta 7).
			 *
			 * theme.js → applyToDOM() es el ÚNICO dueño de --ui-scale en
			 * runtime. Este script solo adelanta el MISMO cálculo para el
			 * primer frame. CONTRATO: la fórmula (uiScale número → /100, si
			 * no 1) está duplicada aquí y en theme.js computeUiScale() por
			 * necesidad (el inline no puede importar). Cámbiala en ambos.
			 * ─────────────────────────────────────────────────────────── */
			(function () {
				try {
					var scale = 1;
					/* ¿Móvil real? Mismo criterio que viewport.isMobileDevice()
					 * (copia inline: este script no puede importar). Táctil +
					 * pantalla física pequeña → escala 1 (el móvil tiene su
					 * propia UI). Usamos screen.*, no innerWidth, para que el
					 * zoom de un escritorio no cuente como móvil. */
					var coarse = !!(window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
					var sw = (window.screen && window.screen.width) || window.innerWidth;
					var sh = (window.screen && window.screen.height) || window.innerHeight;
					var isMobile = coarse && Math.min(sw, sh) < 768;
					if (!isMobile) {
						var raw = localStorage.getItem('nimos-prefs');
						if (raw) {
							var ui = JSON.parse(raw).uiScale;
							if (typeof ui === 'number' && isFinite(ui)) scale = ui / 100;
						}
					}
					document.documentElement.style.setProperty('--ui-scale', String(scale));
				} catch (e) {
					/* localStorage bloqueado o JSON corrupto → escala 1, sin drama */
					document.documentElement.style.setProperty('--ui-scale', '1');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
